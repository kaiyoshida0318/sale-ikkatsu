<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SALE一括 - セール価格計算表ジェネレーター</title>

  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png" />
  <link rel="icon" href="assets/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />

  <meta name="description" content="楽天RMSとネクストエンジンのCSVから、セール価格計算表Excelをブラウザだけで自動生成。データは外に送られません。" />
  <meta property="og:title" content="SALE一括 - セール価格計算表ジェネレーター" />
  <meta property="og:description" content="楽天RMS × ネクストエンジン → セール価格計算表を自動生成（完全ブラウザ処理）" />
  <meta property="og:image" content="assets/ogp.png" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="assets/ogp.png" />
  <style>
    :root {
      --brand: #1e3a5f;
      --brand-dark: #0d2340;
      --brand-accent: #FFC857;
      --green: #3dee56;
      --gray: #9e9da7;
      --bg: #f7f7f9;
      --card: #ffffff;
      --text: #222;
      --muted: #666;
      --border: #e2e2e8;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      font-family: "游ゴシック", "Yu Gothic", "Hiragino Sans", "Meiryo", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      padding: 18px 28px;
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
      position: relative;
    }
    /* 横長プレートロゴ */
    .logo-plate {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--brand), var(--brand-dark));
      border: 3px solid var(--brand-accent);
      border-radius: 12px;
      padding: 8px 15px;
      line-height: 1;
      cursor: pointer;
      transition: transform .1s, box-shadow .15s;
      border-style: solid;
    }
    .logo-plate:hover {
      box-shadow: 0 3px 10px rgba(30, 58, 95, 0.25);
    }
    .logo-plate:active {
      transform: translateY(1px);
    }
    .logo-plate .mark {
      display: block;
      width: 65px;
      height: 65px;
      flex-shrink: 0;
    }
    /* セール種別ドロップダウン */
    .sale-type-wrap {
      display: inline-flex;
      align-items: stretch;
      border: 3px solid #d63031;
      border-radius: 10px;
      background: #fff;
      overflow: hidden;
    }
    .sale-type-wrap.type-marathon { border-color: #1b8f3a; }
    .sale-type-wrap .sale-type-tag {
      background: #d63031;
      color: #fff;
      padding: 0 12px;
      font-weight: 700;
      font-size: 12px;
      display: flex;
      align-items: center;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }
    .sale-type-wrap.type-marathon .sale-type-tag { background: #1b8f3a; }
    .sale-type-select {
      font-size: 19px;
      font-weight: 700;
      padding: 8px 39px 8px 14px;
      border: 0;
      background: #fff;
      color: #d63031;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='10' viewBox='0 0 14 10'><path d='M1 1l6 6 6-6' stroke='%23d63031' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
      background-repeat: no-repeat;
      background-position: right 14px center;
      min-width: 221px;
      font-family: inherit;
    }
    .sale-type-wrap.type-marathon .sale-type-select {
      color: #1b8f3a;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='10' viewBox='0 0 14 10'><path d='M1 1l6 6 6-6' stroke='%231b8f3a' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    }
    .sale-type-select:focus {
      outline: none;
      box-shadow: inset 0 0 0 3px rgba(30, 58, 95, 0.15);
    }

    /* セール期間入力 */
    .sale-period {
      display: inline-flex;
      align-items: stretch;
      border: 3px solid var(--brand);
      border-radius: 10px;
      background: #fff;
      overflow: hidden;
    }
    .sale-period .period-cell {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      min-width: 200px;
    }
    .sale-period .period-cell + .period-cell {
      border-left: 2px solid var(--brand);
    }
    .sale-period .period-label {
      background: var(--brand);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 5px 10px;
      text-align: center;
    }
    .sale-period .period-input-wrap {
      padding: 6px 14px 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sale-period input {
      border: 0;
      background: transparent;
      font-size: 17px;
      font-weight: 700;
      font-family: inherit;
      font-variant-numeric: tabular-nums;
      padding: 2px 0;
      width: 100%;
      text-align: center;
      color: var(--brand);
      letter-spacing: 0.02em;
    }
    .sale-period input:focus {
      outline: none;
      background: #e8eef7;
      border-radius: 4px;
    }
    .sale-period input::placeholder {
      color: #a8b3c6;
      font-weight: 700;
    }
    /* 右上の v0.x.x バージョン表示 + 文字サイズコントロール */
    header .header-right {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    header .version {
      font-size: 12px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      color: var(--muted);
      letter-spacing: 0.05em;
    }
    .font-size-control {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #f0f0f2;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px;
    }
    .font-size-control button {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 4px 10px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      min-width: 32px;
    }
    .font-size-control button:hover { background: #fafafa; }
    .font-size-control button:active { transform: translateY(1px); }
    .font-size-control .pct {
      font-size: 12px;
      color: var(--text);
      font-weight: 600;
      min-width: 38px;
      text-align: center;
      padding: 0 4px;
      font-variant-numeric: tabular-nums;
    }
    /* Pythonランタイム状態表示 */
    .py-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
    }
    .py-status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f39c12;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .py-status.ready .py-status-dot {
      background: #27ae60;
      animation: none;
    }
    .py-status.error .py-status-dot {
      background: #e74c3c;
      animation: none;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    main {
      max-width: 960px;
      margin: 24px auto;
      padding: 0 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 17px;
      border-left: 4px solid var(--brand);
      padding-left: 10px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
    }
    .file-input {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 16px;
      text-align: left;
      transition: border-color .15s, background .15s;
      background: #fafafa;
    }
    .file-input:hover { border-color: var(--brand); background: #f0f4fb; }
    .file-input.filled { border-color: var(--green); border-style: solid; background: #f0fff2; }
    .file-input label {
      display: block;
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 6px;
    }
    .file-input .desc { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
    .file-input input[type=file] { width: 100%; font-size: 13px; }
    .filename {
      margin-top: 6px;
      font-size: 12px;
      color: #1a7c38;
      word-break: break-all;
    }
    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    button {
      background: var(--brand);
      color: white;
      border: 0;
      border-radius: 6px;
      padding: 12px 22px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .05s;
    }
    button:hover:not(:disabled) { background: var(--brand-dark); }
    button:active { transform: translateY(1px); }
    button:disabled { background: #bbb; cursor: not-allowed; }
    button.secondary {
      background: #f0f0f2;
      color: var(--text);
      border: 1px solid var(--border);
    }
    button.secondary:hover:not(:disabled) { background: #e4e4ea; }
    .status {
      margin-top: 14px;
      font-size: 14px;
      min-height: 20px;
    }
    .status.error { color: #c0392b; }
    .status.success { color: #1a7c38; }
    .stats {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
    }
    .stats .item {
      background: #f7f8fa;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
    }
    .stats .item .label { font-size: 11px; color: var(--muted); }
    .stats .item .value { font-size: 20px; font-weight: 600; margin-top: 2px; }
    .warnings {
      margin-top: 12px;
      max-height: 180px;
      overflow-y: auto;
      background: #fff8e1;
      border: 1px solid #ffd666;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 12px;
      color: #8a6d00;
    }
    .warnings ul { margin: 4px 0 0 18px; padding: 0; }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #ddd;
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hint {
      background: #eef5ff;
      border-left: 4px solid #4a90e2;
      padding: 12px 14px;
      border-radius: 4px;
      font-size: 13px;
      color: #2a5a94;
    }
    .progress {
      margin-top: 12px;
      padding: 14px 18px;
      background: #f0f4fb;
      border: 1px solid #cddcf3;
      border-radius: 6px;
      font-size: 13px;
      color: #2a5a94;
    }
    .progress-bar {
      height: 4px;
      background: #e2e2e8;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-bar > div {
      height: 100%;
      background: var(--brand);
      transition: width .3s;
    }
    footer {
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-size: 12px;
    }
    footer a { color: var(--muted); }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      background: #eef5ff;
      color: #2a5a94;
      font-size: 11px;
      font-weight: 600;
      margin-left: 8px;
    }

    /* ツール選択 */
    .tool-launcher {
      display: grid;
      gap: 12px;
      margin-bottom: 20px;
    }
    .tool-btn {
      background: #2563eb;
      border: 0;
      border-radius: 8px;
      padding: 16px 22px;
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background .15s, transform .05s;
      font-family: inherit;
    }
    .tool-btn:hover:not(:disabled) {
      background: #1d4fd8;
    }
    .tool-btn:active:not(:disabled) { transform: translateY(1px); }
    .tool-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .tool-btn .plus-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      flex-shrink: 0;
      line-height: 1;
    }
    .tool-btn .tool-label {
      flex: 1;
      font-weight: 600;
    }
    .tool-btn .tool-sub {
      font-size: 11px;
      font-weight: 400;
      opacity: 0.85;
      margin-top: 3px;
    }
    .tool-btn.coming-soon {
      background: #ea8c2c;
    }
    .tool-btn.coming-soon:hover:not(:disabled) { background: #d37820; }
    .tool-btn.variant-green { background: #22a857; }
    .tool-btn.variant-green:hover:not(:disabled) { background: #1c8f49; }

    /* ツール本体（折りたたみ） */
    .tool-panel {
      display: none;
    }
    .tool-panel.active {
      display: block;
    }
    .tool-panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .back-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
    }
    .back-btn:hover {
      background: #f0f0f2;
      color: var(--text);
    }
    .tool-panel-header h2 {
      margin: 0;
      font-size: 18px;
      border-left: 4px solid var(--brand);
      padding-left: 10px;
    }

    /* メインタブ(アプリ上部の常駐タブ) */
    .main-tabs-bar {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: stretch;
      gap: 4px;
    }
    .main-tab {
      background: transparent;
      border: 0;
      padding: 14px 22px;
      font-size: 16px;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      border-bottom: 3px solid transparent;
      margin-bottom: -1px;
      transition: color .15s, border-color .15s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .main-tab:hover { color: var(--text); }
    .main-tab.active {
      color: #2e6bc3;
      border-bottom-color: #4a90e2;
    }
    .main-tab .icon-chart {
      display: inline-block;
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    /* サブアクション行(メインタブの下、右端に小ボタン) */
    .sub-action-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 10px 24px 0;
      gap: 8px;
    }
    .btn-mini {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #2563eb;
      border: 0;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      transition: background .15s, transform .05s;
    }
    .btn-mini:hover:not(:disabled) { background: #1d4fd8; }
    .btn-mini:active:not(:disabled) { transform: translateY(1px); }
    .btn-mini .plus { font-size: 15px; font-weight: 700; line-height: 1; }

    /* サブタブ(OFF率切替) */
    .tabs {
      display: flex;
      gap: 2px;
      border-bottom: 2px solid var(--border);
      margin-bottom: 0;
      flex-wrap: wrap;
    }
    .tab {
      background: transparent;
      border: 0;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color .15s, border-color .15s, background .15s;
    }
    .tab:hover { background: #f0f0f2; }
    .tab[data-offrate="all"]:hover { color: var(--text); }
    .tab.active {
      color: var(--brand);
      border-bottom-color: var(--brand);
      background: transparent;
    }
    .tab.tab-10:hover { color: #1c4b8a; }
    .tab.tab-20:hover { color: #a14d0a; }
    .tab.tab-30:hover { color: #165d28; }
    .tab.tab-50:hover { color: #a81f1f; }
    .tab.active.tab-10 { color: #1c4b8a; border-bottom-color: #1c4b8a; background: transparent; }
    .tab.active.tab-20 { color: #a14d0a; border-bottom-color: #a14d0a; background: transparent; }
    .tab.active.tab-30 { color: #165d28; border-bottom-color: #165d28; background: transparent; }
    .tab.active.tab-50 { color: #a81f1f; border-bottom-color: #a81f1f; background: transparent; }

    /* 商品テーブル */
    .product-table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 0 0 8px 8px;
      padding: 16px;
      overflow-x: auto;
    }
    .product-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .product-table th,
    .product-table td {
      padding: 8px 10px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .product-table th {
      background: #f4f5f8;
      font-weight: 700;
      color: var(--text);
      position: sticky;
      top: 0;
    }
    .product-table td.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .product-table tr:hover td { background: #fafbfd; }
    .product-table .name { max-width: 360px; white-space: normal; }
    .product-table .placeholder-cell {
      color: #b5b5c0;
      font-style: italic;
      font-size: 12px;
    }
    .product-table .mgr {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 12px;
      color: var(--text);
    }
    .product-table th.col-mgr { min-width: 110px; }
    .product-table th.col-name { min-width: 240px; max-width: 360px; }
    .product-table th.col-img { width: 80px; }
    .product-table th.col-discount { min-width: 200px; }
    .product-table th.col-title { min-width: 240px; max-width: 360px; }
    .product-table th.col-saletitle { min-width: 220px; }
    .product-table .img-cell { text-align: center; }
    .product-table .img-placeholder {
      width: 64px;
      height: 64px;
      background: #f0f0f2;
      border: 1px dashed #c9c9d1;
      border-radius: 6px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #999;
    }
    .product-table .discount-multi {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 12px;
      font-size: 12px;
      white-space: nowrap;
    }
    .product-table .discount-multi span b { font-weight: 700; margin-right: 4px; color: var(--brand); }
    .product-table .discount-single .discount-price {
      font-size: 14px;
      font-weight: 700;
      color: var(--brand);
    }
    .product-table .discount-single .discount-detail {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }
    .product-table .editable-cell {
      min-height: 40px;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: #fffef5;
      font-size: 13px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
      cursor: text;
      transition: border-color .1s, background .1s;
    }
    .product-table .editable-cell:hover { border-color: #b9b9c4; }
    .product-table .editable-cell:focus {
      outline: none;
      border-color: var(--brand);
      background: #fff;
      box-shadow: 0 0 0 2px rgba(30, 58, 95, 0.1);
    }
    .product-table .editable-cell:empty::before {
      content: "（クリックして入力）";
      color: #b5b5c0;
      pointer-events: none;
    }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      background: #fafbfd;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <header>
    <div id="logo-home" class="logo-plate" role="button" tabindex="0" aria-label="トップ画面に戻る" title="トップ画面に戻る">
      <svg class="mark" viewBox="0 0 48 48" aria-hidden="true">
        <rect x="3" y="3" width="42" height="42" rx="7" fill="none" stroke="#FFC857" stroke-width="3"/>

  <!-- ExcelJS (CDN) と 自前のロジック -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
  <script src="./app/merger.js"></script>
  <script src="./app/builder.js"></script>
  <script>
    // ---- 状態管理 ----
    // JS版は即座に使える（Pyodideのような重い準備なし）。
    // ExcelJSのロードを軽く確認するだけ。
    let appReady = false;
    let appReadyPromise = null;

    function setPyStatus(text, state) {
      const el = document.getElementById('py-status');
      if (!el) return;
      el.classList.remove('ready', 'error');
      if (state) el.classList.add(state);
      el.querySelector('.py-status-text').textContent = text;
    }

    async function bootApp() {
      try {
        setPyStatus('ライブラリ確認中...', null);
        // ExcelJSが読み込まれるまで少し待つ(<script>なので基本は同期読み込み済みだが保険)
        let retries = 0;
        while (typeof ExcelJS === 'undefined' && retries < 50) {
          await new Promise(r => setTimeout(r, 100));
          retries++;
        }
        if (typeof ExcelJS === 'undefined') {
          throw new Error('ExcelJSの読み込みに失敗しました');
        }
        if (typeof SaleIkkatsuMerger === 'undefined' || typeof SaleIkkatsuBuilder === 'undefined') {
          throw new Error('アプリコードの読み込みに失敗しました');
        }
        appReady = true;
        setPyStatus('準備完了', 'ready');
      } catch (e) {
        setPyStatus('起動エラー: ' + e.message, 'error');
        console.error('Boot error:', e);
        throw e;
      }
    }

    // Service Worker登録（2回目以降さらに高速化）
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch((e) => {
          console.log('SW登録スキップ:', e);
        });
      });
    }

    appReadyPromise = bootApp();

    // ---- 文字サイズコントロール ----
    const FS_KEY = 'sale-ikkatsu-font-scale';
    const FS_LEVELS = [0.85, 0.9, 0.95, 1.0, 1.1, 1.2, 1.35, 1.5];

    function getFsIndex() {
      const v = parseFloat(localStorage.getItem(FS_KEY) || '1.0');
      const i = FS_LEVELS.indexOf(v);
      return i >= 0 ? i : FS_LEVELS.indexOf(1.0);
    }
    function applyFs(level) {
      const main = document.querySelector('main');
      if (!main) return;
      main.style.zoom = level;
      const pct = Math.round(level * 100);
      const el = document.getElementById('fs-pct');
      if (el) el.textContent = pct + '%';
      localStorage.setItem(FS_KEY, String(level));
    }
    function fsAdjust(delta) {
      let i = getFsIndex();
      i = Math.max(0, Math.min(FS_LEVELS.length - 1, i + delta));
      applyFs(FS_LEVELS[i]);
    }

    document.getElementById('fs-up').addEventListener('click', () => fsAdjust(+1));
    document.getElementById('fs-down').addEventListener('click', () => fsAdjust(-1));
    document.getElementById('fs-pct').addEventListener('click', () => applyFs(1.0));
    // 初期値適用
    applyFs(FS_LEVELS[getFsIndex()]);

    // ---- UI制御 ----
    // メインタブ(products) ⇄ サブビュー(sale-price) の切替
    function showView(viewId) {
      document.querySelectorAll('.tool-panel').forEach(p => p.classList.remove('active'));
      const panel = document.getElementById('tool-' + viewId);
      if (panel) panel.classList.add('active');
      // サブアクションバーはメインタブ表示中のみ表示
      const subAction = document.querySelector('.sub-action-bar');
      if (subAction) {
        subAction.style.display = (viewId === 'products') ? 'flex' : 'none';
      }
      // メインタブ active 状態
      document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
      if (viewId === 'products') {
        const mt = document.querySelector('.main-tab[data-main-tab="products"]');
        if (mt) mt.classList.add('active');
      }
    }

    // メインタブのクリック
    document.querySelectorAll('.main-tab[data-main-tab]').forEach(tab => {
      tab.addEventListener('click', () => {
        showView(tab.getAttribute('data-main-tab'));
      });
    });

    // 「+セール価格決定用」ボタン
    const btnOpenSalePrice = document.getElementById('btn-open-sale-price');
    if (btnOpenSalePrice) {
      btnOpenSalePrice.addEventListener('click', () => showView('sale-price'));
    }

    // 戻るボタン → メインタブ(products)へ
    document.querySelectorAll('[data-back]').forEach(btn => {
      btn.addEventListener('click', () => showView('products'));
    });

    // ロゴクリック → トップ(products)へ
    const logoHome = document.getElementById('logo-home');
    if (logoHome) {
      logoHome.addEventListener('click', () => showView('products'));
      logoHome.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          showView('products');
        }
      });
    }

    // セール種別の色切替（ラップ要素にクラス適用）＋永続化
    const SALE_TYPE_KEY = 'sale-ikkatsu-sale-type';
    const saleTypeEl = document.getElementById('sale-type');
    const saleTypeWrap = document.getElementById('sale-type-wrap');
    function updateSaleTypeColor() {
      saleTypeWrap.classList.remove('type-super-sale', 'type-marathon');
      const tag = saleTypeWrap.querySelector('.sale-type-tag');
      if (tag) tag.textContent = 'セール名';
      if (saleTypeEl.value === 'marathon') {
        saleTypeWrap.classList.add('type-marathon');
      } else {
        saleTypeWrap.classList.add('type-super-sale');
      }
      localStorage.setItem(SALE_TYPE_KEY, saleTypeEl.value);
    }
    const savedType = localStorage.getItem(SALE_TYPE_KEY);
    if (savedType === 'super-sale' || savedType === 'marathon') {
      saleTypeEl.value = savedType;
    }
    saleTypeEl.addEventListener('change', updateSaleTypeColor);
    updateSaleTypeColor();

    // セール期間 永続化
    const SALE_PERIOD_START = 'sale-ikkatsu-period-start';
    const SALE_PERIOD_END = 'sale-ikkatsu-period-end';
    const saleStartEl = document.getElementById('sale-start');
    const saleEndEl = document.getElementById('sale-end');
    saleStartEl.value = localStorage.getItem(SALE_PERIOD_START) || '';
    saleEndEl.value = localStorage.getItem(SALE_PERIOD_END) || '';
    saleStartEl.addEventListener('input', () => {
      localStorage.setItem(SALE_PERIOD_START, saleStartEl.value);
    });
    saleEndEl.addEventListener('input', () => {
      localStorage.setItem(SALE_PERIOD_END, saleEndEl.value);
    });

    // ---- 商品一覧タブ ----
    // 直近のプレビュー/生成結果の rows を保持して、タブで表示を切り替える
    let lastProductRows = null;
    let currentOffRate = 'all';

    function formatYen(n) {
      if (n === null || n === undefined || n === '') return '';
      const v = Number(n);
      if (!Number.isFinite(v)) return String(n);
      return '¥' + Math.round(v).toLocaleString('ja-JP');
    }
    // P価格: ROUNDDOWN(E*0.9, -1) 等と同等の計算
    function calcOffPrice(normalPrice, rate) {
      if (!Number.isFinite(normalPrice)) return null;
      const mul = (100 - rate) / 100;
      return Math.floor((normalPrice * mul) / 10) * 10;
    }
    // 利益額: ROUNDDOWN(P - F - G - (P*0.01*L) - (P*0.01*M) - (P*0.01*N) - O, 0)
    // G(送料)は未入力のため0で計算。L=6, M=3.5, N=1, O=10
    function calcProfit(offPrice, cost) {
      if (!Number.isFinite(offPrice) || !Number.isFinite(cost)) return null;
      const L = 6, M = 3.5, N = 1, O = 10, G = 0;
      const p = offPrice - cost - G
               - (offPrice * 0.01 * L)
               - (offPrice * 0.01 * M)
               - (offPrice * 0.01 * N)
               - O;
      return Math.floor(p);
    }
    function calcProfitRate(profit, offPrice) {
      if (!Number.isFinite(profit) || !Number.isFinite(offPrice) || offPrice === 0) return null;
      return Math.floor((profit / offPrice) * 100);
    }

    // セール用タイトル(ユーザー編集) を localStorage に保存
    const SALE_TITLE_KEY = 'sale-ikkatsu-sale-titles';
    function loadSaleTitles() {
      try {
        return JSON.parse(localStorage.getItem(SALE_TITLE_KEY) || '{}');
      } catch (e) {
        return {};
      }
    }
    function saveSaleTitle(mgrCode, value) {
      const data = loadSaleTitles();
      if (value && value.trim()) {
        data[mgrCode] = value;
      } else {
        delete data[mgrCode];
      }
      try {
        localStorage.setItem(SALE_TITLE_KEY, JSON.stringify(data));
      } catch (e) {
        console.warn('セール用タイトル保存失敗:', e);
      }
    }

    function renderProductTable() {
      const container = document.getElementById('product-table-container');
      if (!container) return;
      if (!lastProductRows || lastProductRows.length === 0) {
        container.innerHTML = '<div class="empty-state">まだデータがありません。<br>「セール価格決定用」でCSVをアップロードすると、ここに商品一覧が表示されます。</div>';
        return;
      }
      // 空白行を除外、商品管理番号でユニークに(同じ管理番号のSKU別行を1行に集約)
      const seenMgr = new Set();
      const rows = [];
      for (const r of lastProductRows) {
        if (r._blank) continue;
        const mgr = r['商品管理番号'] || '';
        if (!mgr || seenMgr.has(mgr)) continue;
        seenMgr.add(mgr);
        rows.push(r);
      }

      const rate = currentOffRate;
      const saleTitles = loadSaleTitles();

      // 共通: 画像プレースホルダー（後で別CSVで埋められるよう構造を整えておく）
      function imageCell(mgr) {
        return `<td class="img-cell"><div class="img-placeholder" data-mgr="${escapeHtml(mgr)}" title="画像（後で追加予定）">画像なし</div></td>`;
      }

      // 共通: セール用タイトルセル(編集可能)
      function saleTitleCell(mgr) {
        const v = saleTitles[mgr] || '';
        return `<td><div class="editable-cell" contenteditable="true" data-mgr="${escapeHtml(mgr)}" data-field="sale-title" spellcheck="false">${escapeHtml(v)}</div></td>`;
      }

      // 割引率の表示文字列
      function discountText(rateMode, price) {
        if (rateMode === 'all') {
          const p10 = formatYen(calcOffPrice(price, 10));
          const p20 = formatYen(calcOffPrice(price, 20));
          const p30 = formatYen(calcOffPrice(price, 30));
          const p50 = formatYen(calcOffPrice(price, 50));
          return `<div class="discount-multi">
            <span><b>10%</b> ${p10}</span>
            <span><b>20%</b> ${p20}</span>
            <span><b>30%</b> ${p30}</span>
            <span><b>50%</b> ${p50}</span>
          </div>`;
        }
        const rateNum = Number(rateMode);
        const offPrice = calcOffPrice(price, rateNum);
        const cost = Number.isFinite(price) ? null : null; // 後で外から渡すので、ここでは未使用
        return `<div class="discount-single"><b>${rateNum}%OFF</b> ${formatYen(offPrice)}</div>`;
      }

      const headHtml = `<tr>
        <th class="col-mgr">商品管理番号</th>
        <th class="col-name">商品名</th>
        <th class="col-img">画像</th>
        <th class="col-discount">${rate === 'all' ? '割引率（10/20/30/50%）' : (rate + '%OFF')}</th>
        <th class="col-title">通常タイトル</th>
        <th class="col-saletitle">セール用タイトル</th>
      </tr>`;

      const rowsHtml = rows.map(r => {
        const mgr = r['商品管理番号'] || '';
        const name = r['商品名'] || '';
        const price = Number(r['通常価格']);
        const cost = Number(r['原価']);
        let discountCell;
        if (rate === 'all') {
          const p10 = formatYen(calcOffPrice(price, 10));
          const p20 = formatYen(calcOffPrice(price, 20));
          const p30 = formatYen(calcOffPrice(price, 30));
          const p50 = formatYen(calcOffPrice(price, 50));
          discountCell = `<td><div class="discount-multi">
            <span><b>10%</b> ${p10}</span>
            <span><b>20%</b> ${p20}</span>
            <span><b>30%</b> ${p30}</span>
            <span><b>50%</b> ${p50}</span>
          </div></td>`;
        } else {
          const rateNum = Number(rate);
          const offPrice = calcOffPrice(price, rateNum);
          const profit = calcProfit(offPrice, cost);
          const profitRate = calcProfitRate(profit, offPrice);
          discountCell = `<td><div class="discount-single">
            <div class="discount-price"><b>${rateNum}%OFF</b> ${formatYen(offPrice)}</div>
            <div class="discount-detail">利益 ${profit !== null ? formatYen(profit) : '—'} / ${profitRate !== null ? profitRate + '%' : '—'}</div>
          </div></td>`;
        }
        return `<tr>
          <td class="mgr">${escapeHtml(mgr)}</td>
          <td class="name placeholder-cell">（未登録）</td>
          ${imageCell(mgr)}
          ${discountCell}
          <td class="name placeholder-cell">（未登録）</td>
          ${saleTitleCell(mgr)}
        </tr>`;
      }).join('');

      container.innerHTML = `<table class="product-table">
        <thead>${headHtml}</thead>
        <tbody>${rowsHtml}</tbody>
      </table>
      <div style="margin-top:10px;font-size:12px;color:var(--muted);">表示: ${rows.length}件 ${rate === 'all' ? '（全体）' : '（' + rate + '%OFF）'}</div>`;

      // セール用タイトルの編集 → 保存
      container.querySelectorAll('.editable-cell[data-field="sale-title"]').forEach(el => {
        el.addEventListener('input', () => {
          const mgr = el.getAttribute('data-mgr');
          saveSaleTitle(mgr, el.textContent);
        });
        // Enter で改行を防ぎつつ blur 扱い
        el.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            el.blur();
          }
        });
      });
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[c]);
    }

    // タブ切替
    document.querySelectorAll('.tabs .tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tabs .tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentOffRate = tab.getAttribute('data-offrate');
        renderProductTable();
      });
    });

    // ファイル選択のラベル更新
    document.querySelectorAll('.file-input input[type=file]').forEach(input => {
      input.addEventListener('change', (e) => {
        const wrap = e.target.closest('.file-input');
        const fn = wrap.querySelector('.filename');
        if (e.target.files && e.target.files[0]) {
          fn.textContent = '📎 ' + e.target.files[0].name;
          wrap.classList.add('filled');
        } else {
          fn.textContent = '';
          wrap.classList.remove('filled');
        }
      });
    });

    function setStatus(msg, kind) {
      const el = document.getElementById('status');
      if (!el) return;
      el.className = 'status' + (kind ? ' ' + kind : '');
      el.innerHTML = msg;
    }

    function setButtonsDisabled(d) {
      document.getElementById('btn-preview').disabled = d;
      document.getElementById('btn-generate').disabled = d;
    }

    function renderStats(stats) {
      const box = document.getElementById('stats');
      box.hidden = false;
      box.innerHTML = '';
      const items = [
        { label: 'RMS総行数', value: stats.rms_total },
        { label: '通常価格空欄で除外', value: stats.excluded_no_price },
        { label: '出力行数', value: stats.output_rows },
        { label: 'セット構成から原価取得', value: stats.cost_from_component },
        { label: '単品コードから原価取得', value: stats.cost_from_non_set },
        { label: '原価が見つからなかった', value: stats.cost_not_found },
      ];
      items.forEach(it => {
        const d = document.createElement('div');
        d.className = 'item';
        d.innerHTML = `<div class="label">${it.label}</div><div class="value">${it.value}</div>`;
        box.appendChild(d);
      });
    }

    function renderWarnings(warnings) {
      const box = document.getElementById('warnings');
      if (!warnings || warnings.length === 0) {
        box.hidden = true;
        return;
      }
      box.hidden = false;
      box.innerHTML = '<strong>⚠️ 警告 (' + warnings.length + '件)</strong><ul>' +
        warnings.map(w => '<li>' + String(w).replace(/</g, '&lt;') + '</li>').join('') + '</ul>';
    }

    async function getFileBytes(input) {
      const file = input.files[0];
      if (!file) throw new Error(`${input.name} が未選択です`);
      const buf = await file.arrayBuffer();
      return new Uint8Array(buf);
    }

    async function collectAllBytes() {
      const form = document.getElementById('upload-form');
      return {
        rms: await getFileBytes(form.elements['rms']),
        set_item: await getFileBytes(form.elements['set_item']),
        set_component: await getFileBytes(form.elements['set_component']),
        non_set: await getFileBytes(form.elements['non_set']),
      };
    }

    async function ensureAppReady() {
      if (appReady) return;
      setStatus('<span class="spinner"></span>ライブラリ読み込み中...', '');
      await appReadyPromise;
    }

    document.getElementById('btn-preview').addEventListener('click', async () => {
      setButtonsDisabled(true);
      try {
        await ensureAppReady();
        setStatus('<span class="spinner"></span>プレビュー取得中...', '');
        const b = await collectAllBytes();
        const result = SaleIkkatsuMerger.mergeAll({
          rmsBytes: b.rms,
          setItemBytes: b.set_item,
          setComponentBytes: b.set_component,
          nonSetBytes: b.non_set,
        });
        renderStats(result.stats);
        renderWarnings(result.warnings);
        lastProductRows = result.rows;
        renderProductTable();
        setStatus('✅ プレビュー取得完了（セール参加商品タブに商品一覧が表示されます）', 'success');
      } catch (e) {
        setStatus('❌ エラー: ' + e.message, 'error');
        console.error(e);
      } finally {
        setButtonsDisabled(false);
      }
    });

    document.getElementById('upload-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      setButtonsDisabled(true);
      try {
        await ensureAppReady();
        setStatus('<span class="spinner"></span>Excelを生成中...', '');
        const b = await collectAllBytes();
        const result = SaleIkkatsuMerger.mergeAll({
          rmsBytes: b.rms,
          setItemBytes: b.set_item,
          setComponentBytes: b.set_component,
          nonSetBytes: b.non_set,
        });
        const xlsxBuf = await SaleIkkatsuBuilder.buildXlsx(result.rows);

        renderStats(result.stats);
        renderWarnings(result.warnings);
        lastProductRows = result.rows;
        renderProductTable();

        const blob = new Blob([xlsxBuf], {
          type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
        });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const now = new Date();
        const ts = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
        a.download = `利益計算表_${ts}.xlsx`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        setStatus('✅ Excelをダウンロードしました', 'success');
      } catch (e) {
        setStatus('❌ エラー: ' + e.message, 'error');
        console.error(e);
      } finally {
        setButtonsDisabled(false);
      }
    });
  </script>
</body>
</html>
