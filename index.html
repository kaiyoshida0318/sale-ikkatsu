<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SALE一括 - セール価格計算表ジェネレーター</title>

  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16.png" />
  <link rel="icon" href="assets/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />

  <meta name="description" content="楽天RMSとネクストエンジンのCSVから、セール価格計算表Excelをブラウザだけで自動生成。データは外に送られません。" />
  <meta property="og:title" content="SALE一括 - セール価格計算表ジェネレーター" />
  <meta property="og:description" content="楽天RMS × ネクストエンジン → セール価格計算表を自動生成（完全ブラウザ処理）" />
  <meta property="og:image" content="assets/ogp.png" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="assets/ogp.png" />
  <style>
    :root {
      --brand: #1e3a5f;
      --brand-dark: #0d2340;
      --brand-accent: #FFC857;
      --green: #3dee56;
      --gray: #9e9da7;
      --bg: #f7f7f9;
      --card: #ffffff;
      --text: #222;
      --muted: #666;
      --border: #e2e2e8;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      font-family: "游ゴシック", "Yu Gothic", "Hiragino Sans", "Meiryo", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      background: #ffffff;
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      position: relative;
    }
    /* 横長プレートロゴ */
    .logo-plate {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--brand), var(--brand-dark));
      border: 2px solid var(--brand-accent);
      border-radius: 8px;
      padding: 8px 18px;
      color: var(--brand-accent);
      font-weight: 700;
      font-size: 20px;
      letter-spacing: 0.08em;
      line-height: 1;
      white-space: nowrap;
    }
    .logo-plate .mark {
      display: inline-block;
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }
    /* セール種別ドロップダウン */
    .sale-type-select {
      font-size: 15px;
      font-weight: 700;
      padding: 9px 34px 9px 14px;
      border: 2px solid currentColor;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='currentColor' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
      background-repeat: no-repeat;
      background-position: right 12px center;
      min-width: 200px;
      font-family: inherit;
    }
    .sale-type-select.type-super-sale { color: #d63031; }
    .sale-type-select.type-marathon { color: #1b8f3a; }
    .sale-type-select:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(30, 58, 95, 0.15);
    }
    /* セール期間入力 */
    .sale-period {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 2px solid var(--border);
      background: #fff;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
    }
    .sale-period .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }
    .sale-period input {
      border: 0;
      background: transparent;
      font-size: 14px;
      font-family: inherit;
      font-variant-numeric: tabular-nums;
      padding: 4px 0;
      width: 120px;
      color: var(--text);
    }
    .sale-period input:focus {
      outline: none;
      background: #f0f4fb;
      border-radius: 4px;
    }
    .sale-period input::placeholder {
      color: #b5b5bd;
    }
    .sale-period .sep {
      color: var(--muted);
      font-weight: 600;
    }
    header .version {
      position: absolute;
      top: 10px;
      right: 18px;
      font-size: 11px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      color: var(--muted);
      opacity: 0.8;
      letter-spacing: 0.05em;
    }
    main {
      max-width: 960px;
      margin: 24px auto;
      padding: 0 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 17px;
      border-left: 4px solid var(--brand);
      padding-left: 10px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
    }
    .file-input {
      border: 2px dashed #ccc;
      border-radius: 8px;
      padding: 16px;
      text-align: left;
      transition: border-color .15s, background .15s;
      background: #fafafa;
    }
    .file-input:hover { border-color: var(--brand); background: #f0f4fb; }
    .file-input.filled { border-color: var(--green); border-style: solid; background: #f0fff2; }
    .file-input label {
      display: block;
      font-weight: 600;
      font-size: 13px;
      margin-bottom: 6px;
    }
    .file-input .desc { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
    .file-input input[type=file] { width: 100%; font-size: 13px; }
    .filename {
      margin-top: 6px;
      font-size: 12px;
      color: #1a7c38;
      word-break: break-all;
    }
    .actions {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    button {
      background: var(--brand);
      color: white;
      border: 0;
      border-radius: 6px;
      padding: 12px 22px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .05s;
    }
    button:hover:not(:disabled) { background: var(--brand-dark); }
    button:active { transform: translateY(1px); }
    button:disabled { background: #bbb; cursor: not-allowed; }
    button.secondary {
      background: #f0f0f2;
      color: var(--text);
      border: 1px solid var(--border);
    }
    button.secondary:hover:not(:disabled) { background: #e4e4ea; }
    .status {
      margin-top: 14px;
      font-size: 14px;
      min-height: 20px;
    }
    .status.error { color: #c0392b; }
    .status.success { color: #1a7c38; }
    .stats {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
    }
    .stats .item {
      background: #f7f8fa;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
    }
    .stats .item .label { font-size: 11px; color: var(--muted); }
    .stats .item .value { font-size: 20px; font-weight: 600; margin-top: 2px; }
    .warnings {
      margin-top: 12px;
      max-height: 180px;
      overflow-y: auto;
      background: #fff8e1;
      border: 1px solid #ffd666;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 12px;
      color: #8a6d00;
    }
    .warnings ul { margin: 4px 0 0 18px; padding: 0; }
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #ddd;
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hint {
      background: #eef5ff;
      border-left: 4px solid #4a90e2;
      padding: 12px 14px;
      border-radius: 4px;
      font-size: 13px;
      color: #2a5a94;
    }
    .progress {
      margin-top: 12px;
      padding: 14px 18px;
      background: #f0f4fb;
      border: 1px solid #cddcf3;
      border-radius: 6px;
      font-size: 13px;
      color: #2a5a94;
    }
    .progress-bar {
      height: 4px;
      background: #e2e2e8;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-bar > div {
      height: 100%;
      background: var(--brand);
      transition: width .3s;
    }
    footer {
      text-align: center;
      padding: 20px;
      color: var(--muted);
      font-size: 12px;
    }
    footer a { color: var(--muted); }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      background: #eef5ff;
      color: #2a5a94;
      font-size: 11px;
      font-weight: 600;
      margin-left: 8px;
    }

    /* ツール選択 */
    .tool-launcher {
      display: grid;
      gap: 12px;
      margin-bottom: 20px;
    }
    .tool-btn {
      background: #2563eb;
      border: 0;
      border-radius: 8px;
      padding: 16px 22px;
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background .15s, transform .05s;
      font-family: inherit;
    }
    .tool-btn:hover:not(:disabled) {
      background: #1d4fd8;
    }
    .tool-btn:active:not(:disabled) { transform: translateY(1px); }
    .tool-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .tool-btn .plus-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      flex-shrink: 0;
      line-height: 1;
    }
    .tool-btn .tool-label {
      flex: 1;
      font-weight: 600;
    }
    .tool-btn .tool-sub {
      font-size: 11px;
      font-weight: 400;
      opacity: 0.85;
      margin-top: 3px;
    }
    .tool-btn.coming-soon {
      background: #ea8c2c;
    }
    .tool-btn.coming-soon:hover:not(:disabled) { background: #d37820; }
    .tool-btn.variant-green { background: #22a857; }
    .tool-btn.variant-green:hover:not(:disabled) { background: #1c8f49; }

    /* ツール本体（折りたたみ） */
    .tool-panel {
      display: none;
    }
    .tool-panel.active {
      display: block;
    }
    .tool-panel-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .back-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
    }
    .back-btn:hover {
      background: #f0f0f2;
      color: var(--text);
    }
    .tool-panel-header h2 {
      margin: 0;
      font-size: 18px;
      border-left: 4px solid var(--brand);
      padding-left: 10px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-plate">
      <svg class="mark" viewBox="0 0 48 48" aria-hidden="true">
        <rect x="3" y="3" width="42" height="42" rx="7" fill="none" stroke="#FFC857" stroke-width="3"/>
        <text x="24" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#FFC857" text-anchor="middle">SALE</text>
        <text x="24" y="37" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#FFC857" text-anchor="middle">一括</text>
      </svg>
      <span>SALE一括</span>
    </div>

    <select id="sale-type" class="sale-type-select type-super-sale" aria-label="セール種別">
      <option value="super-sale" selected>楽天スーパーSALE</option>
      <option value="marathon">楽天お買い物マラソン</option>
    </select>

    <div class="sale-period" role="group" aria-label="セール期間">
      <span class="label">セール期間</span>
      <input type="text" id="sale-start" placeholder="5/1 10:00" autocomplete="off" />
      <span class="sep">〜</span>
      <input type="text" id="sale-end" placeholder="5/5 23:59" autocomplete="off" />
    </div>

    <span class="version">v0.5.0</span>
  </header>

  <main>
    <div id="boot-progress" class="card">
      <h2>起動中…</h2>
      <div class="progress">
        <span id="boot-status">Pythonランタイム（Pyodide）を読み込んでいます… 初回は30〜60秒ほどかかります</span>
        <div class="progress-bar"><div id="boot-bar" style="width: 10%"></div></div>
      </div>
    </div>

    <div id="app" style="display:none">
      <!-- ツール選択ハブ (入口) -->
      <div id="tool-hub" class="tool-launcher">
        <button type="button" class="tool-btn" data-tool="sale-price">
          <span class="plus-icon">+</span>
          <span class="tool-label">
            セール価格決定用
            <div class="tool-sub">RMS × NE の4CSVから利益計算表Excelを生成</div>
          </span>
        </button>
      </div>

      <!-- ツール本体: セール価格決定用 -->
      <div id="tool-sale-price" class="tool-panel">
        <div class="tool-panel-header">
          <button type="button" class="back-btn" data-back>← 戻る</button>
          <h2>セール価格決定用</h2>
        </div>

        <div class="card">
          <div class="hint">
            以下4つのCSVをアップロードして「Excelを生成」を押してください。<br>
            CSVはブラウザ内で処理されます（外部サーバーに送信されません）。
          </div>
        </div>

        <div class="card">
          <h2>CSVをアップロード</h2>
          <form id="upload-form">
            <div class="grid">
              <div class="file-input" data-target="rms">
                <label>① RMSデータ</label>
                <div class="desc">RMSから一括DLした商品情報CSV</div>
                <input type="file" name="rms" accept=".csv" required />
                <div class="filename"></div>
              </div>
              <div class="file-input" data-target="set_item">
                <label>② NE-セット商品コード</label>
                <div class="desc">ネクストエンジンのセット商品検索結果</div>
                <input type="file" name="set_item" accept=".csv" required />
                <div class="filename"></div>
              </div>
              <div class="file-input" data-target="set_component">
                <label>③ NE-セット構成物コード</label>
                <div class="desc">セット構成商品の原価情報</div>
                <input type="file" name="set_component" accept=".csv" required />
                <div class="filename"></div>
              </div>
              <div class="file-input" data-target="non_set">
                <label>④ NE-セット無しコード</label>
                <div class="desc">単品商品の原価情報</div>
                <input type="file" name="non_set" accept=".csv" required />
                <div class="filename"></div>
              </div>
            </div>

            <div class="actions">
              <button type="button" id="btn-preview" class="secondary">プレビュー（統計のみ）</button>
              <button type="submit" id="btn-generate">Excelを生成してダウンロード</button>
            </div>
            <div id="status" class="status"></div>
          </form>

          <div id="stats" class="stats" hidden></div>
          <div id="warnings" class="warnings" hidden></div>
        </div>
      </div>
    </div>
  </main>

  <footer>
    SALE一括 v0.5.0 (Browser) &nbsp;•&nbsp;
    <a href="https://github.com/">GitHub</a> &nbsp;•&nbsp;
    Powered by Pyodide
  </footer>

  <!-- Pyodide読み込み -->
  <script src="https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.js"></script>
  <script>
    // ---- 状態管理 ----
    let pyodide = null;
    let pyRunner = null;  // Pythonのrunnerモジュールへの参照

    function setBootStatus(msg, pct) {
      document.getElementById('boot-status').textContent = msg;
      if (typeof pct === 'number') {
        document.getElementById('boot-bar').style.width = pct + '%';
      }
    }

    async function bootPyodide() {
      try {
        setBootStatus('Pyodideをロード中… (約10MB)', 15);
        pyodide = await loadPyodide({
          indexURL: "https://cdn.jsdelivr.net/pyodide/v0.27.0/full/"
        });

        setBootStatus('pandas を読み込み中…', 40);
        await pyodide.loadPackage(['pandas']);

        setBootStatus('openpyxl を読み込み中…', 60);
        // openpyxl はPyodide組み込みではないのでmicropip経由
        // （将来組み込みに含まれた場合も動くよう両方試す）
        try {
          await pyodide.loadPackage(['openpyxl']);
        } catch (e) {
          console.log('loadPackage失敗、micropipで再試行:', e.message);
          await pyodide.loadPackage(['micropip']);
          await pyodide.runPythonAsync(`
import micropip
await micropip.install('openpyxl')
`);
        }

        setBootStatus('アプリコードを読み込み中…', 80);
        // pyapp/ 配下のPythonファイルを取得して仮想FSに書き込む
        for (const name of ['merger.py', 'excel_builder.py', 'runner.py']) {
          const res = await fetch(`./pyapp/${name}`);
          if (!res.ok) throw new Error(`${name} の取得に失敗 (${res.status})`);
          const code = await res.text();
          pyodide.FS.writeFile(`/home/pyodide/${name}`, code);
        }
        pyodide.runPython(`
import sys
sys.path.insert(0, "/home/pyodide")
import runner
        `);
        pyRunner = pyodide.pyimport('runner');

        setBootStatus('準備完了！', 100);
        setTimeout(() => {
          document.getElementById('boot-progress').style.display = 'none';
          document.getElementById('app').style.display = 'block';
        }, 400);
      } catch (e) {
        setBootStatus('❌ 起動エラー: ' + e.message, 0);
        console.error('Boot error:', e);
      }
    }

    // ---- UI制御 ----
    // ツール選択ハブ ←→ ツール本体 の切替
    function showTool(toolId) {
      document.getElementById('tool-hub').style.display = 'none';
      document.querySelectorAll('.tool-panel').forEach(p => p.classList.remove('active'));
      if (toolId) {
        const panel = document.getElementById('tool-' + toolId);
        if (panel) panel.classList.add('active');
      }
    }
    function showHub() {
      document.getElementById('tool-hub').style.display = 'grid';
      document.querySelectorAll('.tool-panel').forEach(p => p.classList.remove('active'));
    }

    document.querySelectorAll('.tool-btn[data-tool]').forEach(btn => {
      btn.addEventListener('click', () => {
        const tool = btn.getAttribute('data-tool');
        showTool(tool);
      });
    });
    document.querySelectorAll('[data-back]').forEach(btn => {
      btn.addEventListener('click', showHub);
    });

    // セール種別の色切替
    const saleTypeEl = document.getElementById('sale-type');
    function updateSaleTypeColor() {
      saleTypeEl.classList.remove('type-super-sale', 'type-marathon');
      if (saleTypeEl.value === 'marathon') {
        saleTypeEl.classList.add('type-marathon');
      } else {
        saleTypeEl.classList.add('type-super-sale');
      }
    }
    saleTypeEl.addEventListener('change', updateSaleTypeColor);
    updateSaleTypeColor();

    // ファイル選択のラベル更新
    document.querySelectorAll('.file-input input[type=file]').forEach(input => {
      input.addEventListener('change', (e) => {
        const wrap = e.target.closest('.file-input');
        const fn = wrap.querySelector('.filename');
        if (e.target.files && e.target.files[0]) {
          fn.textContent = '📎 ' + e.target.files[0].name;
          wrap.classList.add('filled');
        } else {
          fn.textContent = '';
          wrap.classList.remove('filled');
        }
      });
    });

    function setStatus(msg, kind) {
      const el = document.getElementById('status');
      el.className = 'status' + (kind ? ' ' + kind : '');
      el.innerHTML = msg;
    }

    function setButtonsDisabled(d) {
      document.getElementById('btn-preview').disabled = d;
      document.getElementById('btn-generate').disabled = d;
    }

    function renderStats(stats) {
      const box = document.getElementById('stats');
      box.hidden = false;
      box.innerHTML = '';
      const items = [
        { label: 'RMS総行数', value: stats.rms_total },
        { label: '通常価格空欄で除外', value: stats.excluded_no_price },
        { label: '出力行数', value: stats.output_rows },
        { label: 'セット構成から原価取得', value: stats.cost_from_component },
        { label: '単品コードから原価取得', value: stats.cost_from_non_set },
        { label: '原価が見つからなかった', value: stats.cost_not_found },
      ];
      items.forEach(it => {
        const d = document.createElement('div');
        d.className = 'item';
        d.innerHTML = `<div class="label">${it.label}</div><div class="value">${it.value}</div>`;
        box.appendChild(d);
      });
    }

    function renderWarnings(warnings) {
      const box = document.getElementById('warnings');
      if (!warnings || warnings.length === 0) {
        box.hidden = true;
        return;
      }
      box.hidden = false;
      box.innerHTML = '<strong>⚠️ 警告 (' + warnings.length + '件)</strong><ul>' +
        warnings.map(w => '<li>' + String(w).replace(/</g, '&lt;') + '</li>').join('') + '</ul>';
    }

    async function getFileBytes(input) {
      const file = input.files[0];
      if (!file) throw new Error(`${input.name} が未選択です`);
      const buf = await file.arrayBuffer();
      return new Uint8Array(buf);
    }

    async function collectAllBytes() {
      const form = document.getElementById('upload-form');
      return {
        rms: await getFileBytes(form.elements['rms']),
        set_item: await getFileBytes(form.elements['set_item']),
        set_component: await getFileBytes(form.elements['set_component']),
        non_set: await getFileBytes(form.elements['non_set']),
      };
    }

    document.getElementById('btn-preview').addEventListener('click', async () => {
      setButtonsDisabled(true);
      setStatus('<span class="spinner"></span>プレビュー取得中...', '');
      try {
        const b = await collectAllBytes();
        const resultJson = pyRunner.preview(b.rms, b.set_item, b.set_component, b.non_set);
        const data = JSON.parse(resultJson);
        renderStats(data.stats);
        renderWarnings(data.warnings);
        setStatus('✅ プレビュー取得完了', 'success');
      } catch (e) {
        setStatus('❌ エラー: ' + e.message, 'error');
        console.error(e);
      } finally {
        setButtonsDisabled(false);
      }
    });

    document.getElementById('upload-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      setButtonsDisabled(true);
      setStatus('<span class="spinner"></span>Excelを生成中... (5〜20秒)', '');
      try {
        const b = await collectAllBytes();
        const pyResult = pyRunner.process(b.rms, b.set_item, b.set_component, b.non_set);
        // pyResultは PyProxy なので toJs() して取り出す
        const result = pyResult.toJs({ dict_converter: Object.fromEntries });
        pyResult.destroy();

        const xlsxBytes = result.xlsx;
        const stats = result.stats;
        const warnings = result.warnings;

        renderStats(stats);
        renderWarnings(warnings);

        const blob = new Blob([xlsxBytes], {
          type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'
        });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const now = new Date();
        const ts = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
        a.download = `利益計算表_${ts}.xlsx`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        setStatus('✅ Excelをダウンロードしました', 'success');
      } catch (e) {
        setStatus('❌ エラー: ' + e.message, 'error');
        console.error(e);
      } finally {
        setButtonsDisabled(false);
      }
    });

    // 起動
    bootPyodide();
  </script>
</body>
</html>
